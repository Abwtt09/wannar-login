<title>ونار — تسجيل الدخول</title>
<style>

@font-face {
  font-family: 'YearCamel';
  src: url('fonts/TheYearofTheCamel-Thin.otf') format('opentype');
  font-weight: 100; font-display: swap;
}
@font-face {
  font-family: 'YearCamel';
  src: url('fonts/TheYearofTheCamel-ExtraLight.otf') format('opentype');
  font-weight: 200; font-display: swap;
}
@font-face {
  font-family: 'YearCamel';
  src: url('fonts/TheYearofTheCamel-Light.otf') format('opentype');
  font-weight: 300; font-display: swap;
}
@font-face {
  font-family: 'YearCamel';
  src: url('fonts/TheYearofTheCamel-Regular.otf') format('opentype');
  font-weight: 400; font-display: swap;
}
@font-face {
  font-family: 'YearCamel';
  src: url('fonts/TheYearofTheCamel-Medium.otf') format('opentype');
  font-weight: 500; font-display: swap;
}
@font-face {
  font-family: 'YearCamel';
  src: url('fonts/TheYearofTheCamel-Bold.otf') format('opentype');
  font-weight: 700; font-display: swap;
}
@font-face {
  font-family: 'YearCamel';
  src: url('fonts/TheYearofTheCamel-ExtraBold.otf') format('opentype');
  font-weight: 800; font-display: swap;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#026874;--a:#015560;--bg:#013E48;
  --card:#F0F8F8;--white:#fff;
  --dark:#012830;--muted:#4A8F96;--danger:#C0392B;
  --font:'YearCamel',serif;
}
html,body{min-height:100%;font-family:var(--font);background:var(--bg);overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 60% 50% at 10% 5%,rgba(2,104,116,.25) 0%,transparent 60%),
  radial-gradient(ellipse 40% 60% at 90% 95%,rgba(0,0,0,.2) 0%,transparent 60%),
  linear-gradient(158deg,#014E5A 0%,#013040 50%,#010F15 100%);}
.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.13;animation:fl 10s ease-in-out infinite;pointer-events:none;z-index:0}
.o1{width:450px;height:450px;background:#026874;top:-120px;right:-90px}
.o2{width:350px;height:350px;background:#013040;bottom:-80px;left:-80px;animation-delay:-4s}
.o3{width:220px;height:220px;background:#04A0B0;top:40%;left:50%;animation-delay:-7s}
@keyframes fl{0%,100%{transform:translate(0,0) scale(1)}40%{transform:translate(20px,-28px) scale(1.05)}70%{transform:translate(-14px,20px) scale(.97)}}
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.card{background:var(--card);border-radius:32px;width:100%;max-width:430px;padding:44px 40px 40px;
  box-shadow:0 40px 100px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.08),inset 0 1px 0 rgba(255,255,255,.55);
  animation:cardIn .65s cubic-bezier(.16,1,.3,1) both;position:relative}
@keyframes cardIn{from{opacity:0;transform:translateY(34px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.back-home{position:absolute;top:18px;right:18px;display:flex;align-items:center;gap:6px;
  background:rgba(2,104,116,.08);border:1px solid rgba(2,104,116,.2);border-radius:20px;
  padding:7px 14px;color:var(--p);font-size:13px;font-weight:400;font-family:var(--font);
  cursor:pointer;text-decoration:none;transition:all .2s}
.back-home:hover{background:rgba(2,104,116,.15)}
.logo-wrap{display:flex;justify-content:center;margin-bottom:20px;margin-top:10px;animation:logoPop .7s cubic-bezier(.34,1.56,.64,1) .15s both}
@keyframes logoPop{from{opacity:0;transform:scale(.55) rotate(-8deg)}to{opacity:1;transform:scale(1) rotate(0)}}
.logo-img{width:90px;height:90px;border-radius:24px;object-fit:cover;box-shadow:0 10px 32px rgba(2,104,116,.5),0 0 0 3px rgba(2,104,116,.2)}
.title{text-align:center;font-size:26px;font-weight:500;color:var(--dark);margin-bottom:5px;animation:fadeUp .5s ease .3s both;line-height:1.5;font-family:var(--font)}
.sub{text-align:center;font-size:14px;font-weight:300;color:var(--muted);margin-bottom:28px;animation:fadeUp .5s ease .4s both;font-family:var(--font)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.social{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px 18px;
  border-radius:14px;border:none;font-family:var(--font);font-size:14px;font-weight:400;
  cursor:pointer;transition:all .2s ease;margin-bottom:10px}
.social:active{transform:scale(.98)}
.g-btn{background:var(--white);color:var(--dark);border:1.5px solid rgba(2,104,116,.18);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.g-btn:hover{background:#f5fbfb;box-shadow:0 5px 18px rgba(0,0,0,.1);transform:translateY(-1px)}
.a-btn{background:linear-gradient(135deg,#141414,#2a2a2a);color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.22)}
.a-btn:hover{box-shadow:0 7px 24px rgba(0,0,0,.32);transform:translateY(-1px)}
.div-row{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--muted);font-size:13px;font-weight:300;font-family:var(--font)}
.div-row::before,.div-row::after{content:"";flex:1;height:1px;background:rgba(2,104,116,.15)}
.tabs{display:flex;background:rgba(2,104,116,.08);border-radius:12px;padding:4px;margin-bottom:20px}
.tab{flex:1;padding:9px 0;border-radius:9px;border:none;font-family:var(--font);font-size:15px;
  font-weight:400;cursor:pointer;transition:all .25s;background:transparent;color:var(--muted)}
.tab.on{background:linear-gradient(135deg,var(--p),var(--a));color:#fff;box-shadow:0 4px 14px rgba(2,104,116,.4);font-weight:500}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:13px;font-weight:400;color:var(--dark);margin-bottom:7px;font-family:var(--font)}
.fld-wrap{position:relative}
.fld input{width:100%;padding:13px 16px;border:1.5px solid rgba(2,104,116,.18);border-radius:12px;
  background:var(--white);color:var(--dark);font-size:14px;font-family:var(--font);font-weight:400;
  outline:none;transition:border-color .2s,box-shadow .2s;direction:ltr;text-align:right}
.fld input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(2,104,116,.12)}
.eye{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:15px;color:var(--muted);padding:0}
.main-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--p),var(--a));border:none;
  border-radius:14px;color:#fff;font-size:16px;font-weight:700;font-family:var(--font);cursor:pointer;
  box-shadow:0 6px 22px rgba(2,104,116,.5);transition:all .2s;display:flex;align-items:center;
  justify-content:center;gap:8px;margin-top:4px;letter-spacing:.5px}
.main-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(2,104,116,.6)}
.main-btn:active{transform:scale(.98)}
.main-btn:disabled{opacity:.7;cursor:default;transform:none}
.forgot{display:block;text-align:center;margin-top:12px;background:none;border:none;cursor:pointer;
  color:var(--p);font-size:14px;font-weight:300;font-family:var(--font);width:100%;transition:opacity .2s}
.forgot:hover{opacity:.7}
.msg{border-radius:11px;padding:10px 14px;font-size:13px;font-weight:400;text-align:center;
  margin-bottom:14px;font-family:var(--font);animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.err{background:#fff0f0;border:1.5px solid #ffd0d0;color:var(--danger)}
.suc{background:rgba(2,104,116,.09);border:1.5px solid rgba(2,104,116,.3);color:var(--p)}
.spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.rback{display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;color:var(--p);font-size:14px;font-weight:300;font-family:var(--font);padding:0;margin-bottom:16px}
.rback:hover{opacity:.7}
.log-card{text-align:center;padding:8px 0}
.av-big{width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--a));
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px;
  box-shadow:0 8px 26px rgba(2,104,116,.42);overflow:hidden;cursor:pointer;transition:transform .2s}
.av-big:hover{transform:scale(1.06)}
.av-big img{width:100%;height:100%;object-fit:cover}
.av-big .ini{color:#fff;font-size:30px;font-weight:500;font-family:var(--font)}
.log-name{font-size:22px;font-weight:500;color:var(--dark);margin-bottom:4px;font-family:var(--font)}
.log-email{font-size:13px;font-weight:300;color:var(--muted);margin-bottom:20px;font-family:var(--font)}
.edit-lnk{display:inline-block;margin-bottom:14px;font-size:14px;color:var(--p);font-weight:400;
  cursor:pointer;text-decoration:none;background:rgba(2,104,116,.08);padding:7px 16px;
  border-radius:20px;border:1px solid rgba(2,104,116,.2);transition:all .2s;font-family:var(--font)}
.edit-lnk:hover{background:rgba(2,104,116,.15)}
[hidden]{display:none!important}
.gi{width:18px;height:18px;flex-shrink:0}
.ai{width:15px;height:15px;flex-shrink:0}
@media(max-width:480px){.card{padding:32px 22px 28px;border-radius:26px}.title{font-size:22px}}
</style>
</head>
